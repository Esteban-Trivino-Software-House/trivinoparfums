name: Sincronizar catálogo del proveedor

on:
  schedule:
    # Corre todos los días a las 3am (hora Colombia = UTC-5, así que 8am UTC)
    - cron: "0 8 * * *"
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Actualizar catálogo
        run: python scripts/update_catalog.py

      - name: Regenerar páginas de producto
        run: python scripts/generate_product_pages.py

      - name: Verificar cambios
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit y push si hay cambios
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html p/
          git commit -m "chore: sync automático del catálogo $(date +'%Y-%m-%d')"
          git push
