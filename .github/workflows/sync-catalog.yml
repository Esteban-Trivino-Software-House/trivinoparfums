name: Sincronizar catálogo y desplegar

on:
  schedule:
    # Corre todos los días a las 3am (hora Colombia = UTC-5, así que 8am UTC)
    - cron: "0 8 * * *"
  push:
    branches: [feature/tienda-web]
  workflow_dispatch:

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests 2>/dev/null || true

      - name: Actualizar catálogo
        run: python scripts/update_catalog.py

      - name: Regenerar páginas de producto
        run: python scripts/generate_product_pages.py

      - name: Commit catálogo si hay cambios (sin la API key)
        run: |
          git diff --quiet && echo "Sin cambios en catálogo" || (
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html p/
            git commit -m "chore: sync automático del catálogo $(date +'%Y-%m-%d')"
            git push
          )

      - name: Inyectar API key de Gemini (solo en el artifact, nunca en el repo)
        run: |
          sed -i "s|__GEMINI_KEY__|${{ secrets.GEMINI_API_KEY }}|g" index.html

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir sitio como artifact de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Desplegar a GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
