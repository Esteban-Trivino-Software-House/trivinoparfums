name: Sincronizar catálogo

on:
  schedule:
    # Corre todos los días a las 3am (hora Colombia = UTC-5, así que 8am UTC)
    - cron: "0 8 * * *"
  push:
    branches: [feature/tienda-web]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests 2>/dev/null || true

      - name: Actualizar catálogo
        run: python scripts/update_catalog.py

      - name: Regenerar páginas de producto
        run: python scripts/generate_product_pages.py

      - name: Commit catálogo si hay cambios
        run: |
          git diff --quiet && echo "Sin cambios en catálogo" || (
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html p/
            git commit -m "chore: sync automático del catálogo $(date +'%Y-%m-%d')"
            git pull --rebase origin feature/tienda-web
            git push
          )
      # Netlify detecta el push y despliega automáticamente.
      # La inyección de GEMINI_API_KEY y WOMPI_PUBLIC_KEY
      # ocurre en el build command definido en netlify.toml.

