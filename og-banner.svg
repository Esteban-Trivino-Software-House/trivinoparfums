<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafaf8"/>
      <stop offset="100%" style="stop-color:#f0ede6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8902a"/>
      <stop offset="50%" style="stop-color:#d4a83c"/>
      <stop offset="100%" style="stop-color:#b8902a"/>
    </linearGradient>
    <linearGradient id="vignette" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(184,144,42,0.06)"/>
      <stop offset="100%" style="stop-color:rgba(184,144,42,0.00)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Decorative circles (subtle) -->
  <circle cx="100" cy="100" r="180" fill="none" stroke="#b8902a" stroke-width="0.5" opacity="0.15"/>
  <circle cx="100" cy="100" r="240" fill="none" stroke="#b8902a" stroke-width="0.5" opacity="0.08"/>
  <circle cx="1100" cy="530" r="180" fill="none" stroke="#b8902a" stroke-width="0.5" opacity="0.15"/>
  <circle cx="1100" cy="530" r="240" fill="none" stroke="#b8902a" stroke-width="0.5" opacity="0.08"/>

  <!-- Top gold line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#gold)"/>

  <!-- Corner decorations -->
  <line x1="60" y1="60" x2="120" y2="60" stroke="#b8902a" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="60" x2="60" y2="120" stroke="#b8902a" stroke-width="1" opacity="0.4"/>
  <line x1="1140" y1="60" x2="1080" y2="60" stroke="#b8902a" stroke-width="1" opacity="0.4"/>
  <line x1="1140" y1="60" x2="1140" y2="120" stroke="#b8902a" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="570" x2="120" y2="570" stroke="#b8902a" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="570" x2="60" y2="510" stroke="#b8902a" stroke-width="1" opacity="0.4"/>
  <line x1="1140" y1="570" x2="1080" y2="570" stroke="#b8902a" stroke-width="1" opacity="0.4"/>
  <line x1="1140" y1="570" x2="1140" y2="510" stroke="#b8902a" stroke-width="1" opacity="0.4"/>

  <!-- Eyebrow label -->
  <text x="600" y="218" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#b8902a" letter-spacing="8" opacity="0.9">FRAGANCIAS PREMIUM</text>

  <!-- Horizontal lines around eyebrow -->
  <line x1="360" y1="210" x2="480" y2="210" stroke="#b8902a" stroke-width="0.8" opacity="0.4"/>
  <line x1="720" y1="210" x2="840" y2="210" stroke="#b8902a" stroke-width="0.8" opacity="0.4"/>

  <!-- Main title -->
  <text x="600" y="320" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="600" fill="#1a1814" letter-spacing="-1">TRIVINO</text>
  <text x="600" y="400" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="300" font-style="italic" fill="#b8902a" letter-spacing="18">Parfums</text>

  <!-- Gold separator line -->
  <rect x="480" y="430" width="240" height="1.5" fill="url(#gold)" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="600" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#6b6560" letter-spacing="3">Más de 400 fragancias · Envíos a toda Colombia</text>

  <!-- Badge pills -->
  <rect x="330" y="510" width="160" height="32" rx="16" fill="none" stroke="#b8902a" stroke-width="1" opacity="0.5"/>
  <text x="410" y="531" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b6560" letter-spacing="1">8–12 hrs duración</text>

  <rect x="520" y="510" width="160" height="32" rx="16" fill="none" stroke="#b8902a" stroke-width="1" opacity="0.5"/>
  <text x="600" y="531" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b6560" letter-spacing="1">Pago por WhatsApp</text>

  <rect x="710" y="510" width="160" height="32" rx="16" fill="none" stroke="#b8902a" stroke-width="1" opacity="0.5"/>
  <text x="790" y="531" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#6b6560" letter-spacing="1">Precio mayorista x2</text>

  <!-- Bottom gold line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#gold)"/>
</svg>
